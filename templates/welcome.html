<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CakapBuddy</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
}

.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:60px;
    min-height:80vh;
    padding:40px;
    flex-wrap:wrap;
}

.hero-text{
    max-width:500px;
}

.hero-text h1{
    font-size:3rem;
    color:#003366;
    margin-bottom:15px;
}

.hero-text .subtitle{
    font-size:1.15rem;
    color:#555;
    margin-bottom:25px;
    line-height:1.6;
}

.buttons{
    margin-bottom:20px;
}

.note{
    font-size:0.85rem;
    color:#888;
    margin-top:15px;
}

.hero-image video{
    width:300px;
    max-width:100%;
}
</style>

</head>

<body>

<header class="navbar">
    <div class="logo">
        <img src="{{ url_for('static', filename='images/cat-icon.png') }}"
             alt="CakapBuddy Logo"
             class="logo-icon">

        <span class="logo-text">
            Cakap<span>Buddy</span>
        </span>
    </div>
</header>

<main class="hero">

    <div class="hero-text">
        <h1>Let's Learn to Speak!</h1>

        <p class="subtitle">
            Your cute companion for practicing pronunciation in a fun and interactive way.
        </p>

        <div class="buttons">
            <a href="{{ url_for('language') }}" class="btn primary">
                Start Now 🚀
            </a>
        </div>

        <p class="note">
            *This website supports early speaking practice and should be used with guidance from teachers or parents.
        </p>
    </div>

    <div class="hero-image">
        <video autoplay loop muted playsinline>
            <source src="{{ url_for('static', filename='images/buddy.webm') }}" type="video/webm">
            Your browser does not support the video tag.
        </video>
    </div>

</main>

<footer>
    <p style="text-align:center; font-size:0.8em; color:#888;">
        © CakapBuddy by Erinna
    </p>
</footer>

</body>
</html>
