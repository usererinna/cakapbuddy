<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Language - CakapBuddy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/cat-icon.png') }}" class="logo-icon">
            <span class="logo-text">Cakap<span>Buddy</span></span>
        </div>
    </header>

    <main class="page-section">
        <div class="center-box">
            <h2>Select Language</h2>
            <p class="subtitle">Choose your preferred language before starting.</p>

            <div class="language-buttons">
                <a href="{{ url_for('set_language', selected='english') }}" class="btn primary">English</a>
                <a href="{{ url_for('set_language', selected='malay') }}" class="btn secondary">Bahasa Melayu</a>
            </div>

            <!-- Back to Welcome Page Link -->
            <div style="margin-top: 30px;">
                <a href="/" style="text-decoration: none; color: #888; font-weight: 600; font-size: 1rem; display: inline-flex; align-items: center; gap: 5px; transition: color 0.2s;" onmouseover="this.style.color='#003366'" onmouseout="this.style.color='#888'">
                    ← Back to Welcome Page
                </a>
            </div>
        </div>
    </main>
</body>
</html>
